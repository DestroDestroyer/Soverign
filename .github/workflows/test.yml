name: CI — Test & Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Core unit tests ──────────────────────────────────────────────────
  core-tests:
    name: Core Unit Tests (Bun)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: sovereign-core

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test --timeout 30000
        env:
          CI: "true"
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: sovereign-core/test-results/
          if-no-files-found: ignore

  # ── Job 2: IPC / DOM / CSS contract validation ──────────────────────────────
  contract-validation:
    name: Contract Validation (IPC, DOM, CSS)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: sovereign-desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        run: npm ci

      - name: Run contract validator (must exit 0)
        run: node validate.js

  # ── Job 3: TypeScript type check ────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: windows-latest
    defaults:
      run:
        working-directory: sovereign-core

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit --skipLibCheck
        continue-on-error: true  # TypeScript strict mode — errors are warnings for now

  # ── Job 4: Security audit ───────────────────────────────────────────────────
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit desktop dependencies
        run: npm audit --audit-level=high
        working-directory: sovereign-desktop
        continue-on-error: true  # Report but don't block

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit core dependencies
        run: bun audit 2>/dev/null || echo "bun audit not available — skipping"
        working-directory: sovereign-core
        continue-on-error: true
